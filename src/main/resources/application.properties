spring.application.name=demochatgpt
server.port=8080


# Activar consola H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MUY IMPORTANTE para que primero cree tablas JPA y luego ejecute data.sql
spring.jpa.defer-datasource-initialization=true

# Configuración de la base de datos
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#JWT
jwt.secret=mi_clave_super_segura_12345678901234567890
# 1h
jwt.expiration=3600000


# Error handling (probably better for production)
spring.web.error.include-stacktrace=never
spring.web.error.whitelabel.enabled=false


